<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История выдач - Школьная библиотека</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .site-header {
            background: linear-gradient(135deg, #c95c0f 0%, #b04b0b 100%);
            border-bottom: 1px solid #9a3e0a;
            padding: 20px 0;
            box-shadow: 0 4px 12px rgba(201,92,15,0.2);
            margin-bottom: 30px;
        }

        .site-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 15px;
            line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .main-nav {
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px 20px;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 0 20px;
            align-items: center;
        }

        .nav-auth {
            display: flex;
            gap: 0 20px;
            align-items: center;
        }

        .nav-links a,
        .nav-auth a {
            text-decoration: none;
            color: #ffedd5;
            font-weight: 500;
            font-size: 0.95rem;
            padding: 5px 0;
            transition: color 0.2s ease;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
        }

        .nav-links a:hover,
        .nav-links a.active,
        .nav-auth a:hover,
        .nav-auth a.active {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }

        .admin-only {
            display: none;
        }

        main {
            flex: 1;
            padding-bottom: 40px;
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #0f2b4b;
            margin-bottom: 25px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 10px;
        }

        h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e3a5f;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .info-block, .stats-block {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background-color: #f1f5f9;
            border-radius: 6px;
        }

        .stat-number {
            display: block;
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f2b4b;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #4a5568;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        th {
            background-color: #f1f5f9;
            color: #0f2b4b;
            font-weight: 600;
            text-align: left;
            padding: 12px 15px;
            border-bottom: 2px solid #cbd5e1;
        }

        td {
            padding: 10px 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .status-available {
            color: #0f2b4b;
            font-weight: 500;
            background-color: #e6f7e6;
            padding: 3px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        .status-issued {
            color: #b91c1c;
            font-weight: 500;
            background-color: #fee2e2;
            padding: 3px 8px;
            border-radius: 12px;
            display: inline-block;
        }

        button, .button {
            background-color: #c95c0f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: inline-block;
            text-decoration: none;
            margin-right: 10px;
        }

        button:hover, .button:hover {
            background-color: #b04b0b;
        }

        .action-btn {
            background-color: #e2e8f0;
            color: #0f2b4b;
            padding: 5px 10px;
            font-size: 0.8rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .action-btn:hover {
            background-color: #cbd5e1;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 15px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #c95c0f;
            box-shadow: 0 0 0 2px rgba(201,92,15,0.1);
        }

        .site-footer {
            background: linear-gradient(135deg, #c95c0f 0%, #b04b0b 100%);
            border-top: 1px solid #9a3e0a;
            padding: 25px 0;
            text-align: center;
            color: #fff3e0;
            font-size: 0.95rem;
            margin-top: auto;
            box-shadow: 0 -4px 12px rgba(201,92,15,0.2);
        }

        .site-footer p {
            margin: 0;
            line-height: 1.5;
        }

        .text-muted {
            color: #64748b;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .site-title {
                font-size: 1.2rem;
                text-align: center;
            }
            .nav-wrapper {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-links {
                justify-content: center;
                flex-wrap: wrap;
                gap: 8px 12px;
            }
            .nav-links a {
                font-size: 0.85rem;
                white-space: normal;
                text-align: center;
                padding: 4px 6px;
            }
            .nav-auth {
                text-align: center;
                margin-top: 5px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .info-block img {
                max-width: 100%;
                height: auto;
            }
            button, .button {
                width: 100% !important;
                display: block !important;
                margin-left: 0 !important;
                margin-right: 0 !important;
                white-space: normal !important;
                word-break: break-word !important;
                padding: 8px 4px !important;
                font-size: 0.85rem !important;
            }
            input[type="text"],
            input[type="password"],
            select {
                width: 100% !important;
            }
            .table-wrapper {
                overflow-x: auto;
            }
            table {
                min-width: 500px;
            }
            .contacts-employee {
                flex-direction: column !important;
                text-align: center !important;
            }
            .contacts-employee img {
                width: 180px !important;
                height: 180px !important;
                margin: 0 auto 15px !important;
            }
            .contacts-employee div {
                text-align: center !important;
            }
        }
    </style>
    <style>
        @media (max-width: 768px) {
            button, .button, .btn, #searchBtn, #searchReaderBtn, #historySearchBtn, #addBookBtn, #addReaderBtn, #issueBtn, #returnBtn, #loginBtn {
                width: 100% !important;
                max-width: 100% !important;
                display: block !important;
                white-space: normal !important;
                word-break: break-word !important;
                padding: 8px 4px !important;
                font-size: 14px !important;
                box-sizing: border-box !important;
            }
            input, select {
                width: 100% !important;
                box-sizing: border-box !important;
            }
            .table-wrapper {
                overflow-x: auto !important;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">Школьная библиотека МКОУ «Сивухская СОШ»</h1>
            <nav class="main-nav">
                <div class="nav-wrapper">
                    <div class="nav-links">
                        <a href="index.html">Главная</a>
                        <a href="https://sivukh-sosh.gosuslugi.ru/" target="_blank">Сайт школы</a>
                        <a href="books.html">Книги</a>
                        <a href="readers.html" class="admin-only">Читатели</a>

    <main class="container">

                <input type="text" id="historySearchInput" placeholder="Поиск по читателю или книге..." style="flex: 1; min-width: 150px;">

            </div>
        </div>

        <div class="table-wrapper">

                <thead>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 Школьная библиотека МКОУ «Сивухская СОШ». Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
