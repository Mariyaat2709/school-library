<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выдача книг - Школьная библиотека</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @media (max-width: 768px) {
            button, .button, .btn, #searchBtn, #searchReaderBtn, #historySearchBtn, #addBookBtn, #addReaderBtn, #issueBtn, #returnBtn, #loginBtn {
                width: 100% !important;
                max-width: 100% !important;
                display: block !important;
                white-space: normal !important;
                word-break: break-word !important;
                padding: 8px 4px !important;
                font-size: 14px !important;
                box-sizing: border-box !important;
            }
            input, select {
                width: 100% !important;
                box-sizing: border-box !important;
            }
            .table-wrapper {
                overflow-x: auto !important;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">Школьная библиотека МКОУ «Сивухская СОШ»</h1>
            <nav class="main-nav">
                <div class="nav-wrapper">
                    <div class="nav-links">
                        <a href="index.html">Главная</a>
                        <a href="https://sivukh-sosh.gosuslugi.ru/" target="_blank">Сайт школы</a>
                        <a href="books.html">Книги</a>
                        <a href="readers.html" class="admin-only">Читатели</a>
                        <a href="issue.html" class="active admin-only">Выдача</a>
                        <a href="history.html" class="admin-only">История</a>
                        <a href="rules.html">Правила</a>
                        <a href="contacts.html">Контакты</a>
                    </div>
                    <div class="nav-auth">
                        <a href="login.html" id="login-link">Вход</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2>Выдача и возврат книг</h2>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div style="background-color: #f1f5f9; padding: 25px; border-radius: 8px;">
                <h3 style="margin-top: 0;">Выдать книгу</h3>
                <div>
                    <label><strong>Выберите книгу:</strong></label>
                    <select id="issueBookSelect"></select>
                </div>
                <div>
                    <label><strong>Выберите читателя:</strong></label>
                    <select id="issueReaderSelect"></select>
                </div>
                <button id="issueBtn" style="width: 100%;">Выдать</button>
            </div>

            <div style="background-color: #f1f5f9; padding: 25px; border-radius: 8px;">
                <h3 style="margin-top: 0;">Вернуть книгу</h3>
                <div>
                    <label><strong>Выберите книгу:</strong></label>
                    <select id="returnBookSelect"></select>
                </div>
                <button id="returnBtn" style="width: 100%;">Вернуть</button>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 Школьная библиотека МКОУ «Сивухская СОШ». Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
