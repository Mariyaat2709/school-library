    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">Школьная библиотека МКОУ «Сивухская СОШ»</h1>
            <nav class="main-nav">
                <div class="nav-wrapper">
                    <div class="nav-links">
                        <a href="index.html">Главная</a>
                        <a href="https://sivukh-sosh.gosuslugi.ru/" target="_blank">Сайт школы</a>
                        <a href="books.html">Книги</a>
                        <a href="readers.html" class="active admin-only">Читатели</a>
                        <a href="issue.html" class="admin-only">Выдача</a>
                        <a href="history.html" class="admin-only">История</a>
                        <a href="rules.html">Правила</a>
                        <a href="contacts.html">Контакты</a>
                    </div>
                    <div class="nav-auth">
                        <a href="login.html" id="login-link">Вход</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2>Читатели</h2>

        <div style="margin-bottom: 20px; width: 100%;">
            <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <input type="text" id="searchReaderInput" placeholder="Поиск по ФИО..." style="flex: 1; min-width: 150px;">
                    <button id="searchReaderBtn">Найти</button>
                </div>
                <button id="addReaderBtn" style="width: 100%;">+ Добавить читателя</button>
            </div>
        </div>

        <table>
            <thead>
                    <th>ФИО</th>
                    <th>Класс</th>
                    <th>Действия</th>
                </thead>
            <tbody id="readersTableBody">
                <tr><td colspan="3" class="text-muted">Загрузка...</td></tr>
            </tbody>
        </table>

        <p class="text-muted">Всего читателей: <span id="readerCount">0</span></p>
    </main>

    <footer class="site-footer">
        <div class="container">
