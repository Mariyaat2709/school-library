<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книги - Школьная библиотека</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* Специальные стили для телефонов */
        @media (max-width: 768px) {
            .search-container {
                display: flex;
                flex-direction: column;
                width: 100%;
                gap: 10px;
            }
            .search-container input {
                width: 100%;
                box-sizing: border-box;
            }
            .search-container button {
                width: 100%;
            }
            .admin-only button {
                width: 100%;
                display: block;
                margin-bottom: 5px;
            }
            .admin-only span {
                display: block;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="site-title">Школьная библиотека МКОУ «Сивухская СОШ»</h1>
            <nav class="main-nav">
                <div class="nav-wrapper">
                    <div class="nav-links">
                        <a href="index.html">Главная</a>
                        <a href="https://sivukh-sosh.gosuslugi.ru/" target="_blank">Сайт школы</a>
                        <a href="books.html" class="active">Книги</a>
                        <a href="readers.html" class="admin-only">Читатели</a>
                        <a href="issue.html" class="admin-only">Выдача</a>
                        <a href="history.html" class="admin-only">История</a>
                        <a href="rules.html">Правила</a>
                        <a href="contacts.html">Контакты</a>
                    </div>
                    <div class="nav-auth">
                        <a href="login.html" id="login-link">Вход</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2>Книги</h2>

        <div style="margin-bottom: 25px;">
            <p><strong>Поиск:</strong> Название, автор или год</p>
            <div class="search-container" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <input type="text" id="searchInput" placeholder="Введите запрос..." style="flex: 1; min-width: 250px;">
                <button id="searchBtn">Найти</button>
            </div>
        </div>

        <div class="admin-only" style="margin-bottom: 20px; width: 100%; max-width: 100%; overflow-x: hidden;">
            <button id="addBookBtn" style="width: 100%; max-width: 100%; box-sizing: border-box;">+ Добавить книгу</button>
        </div>

         <table>
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Автор</th>
                    <th>Год</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="booksTableBody">
                <tr><td colspan="5" class="text-muted">Загрузка...</td></tr>
            </tbody>
        </table>

        <p class="text-muted">Найдено книг: <span id="bookCount">0</span></p>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 Школьная библиотека МКОУ «Сивухская СОШ». Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
